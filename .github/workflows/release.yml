name: release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish:
    name: pack + publish to NuGet
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET (8/9/10)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore SH.Framework.Library.Cqrs.Implementation.EntityFrameworkCore.slnx

      - name: Pack library
        run: dotnet pack SH.Framework.Library.Cqrs.Implementation.EntityFrameworkCore/SH.Framework.Library.Cqrs.Implementation.EntityFrameworkCore.csproj --configuration Release --output ./artifacts

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY secret is not set. Add it under repo or org Settings → Secrets → Actions so tag pushes publish to nuget.org."
            exit 1
          fi
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
